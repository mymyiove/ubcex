<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Udemy Letter">
<title>Udemy Letter</title>
<link rel="stylesheet" href="css/letter.css">
<link rel="icon" href="https://www.udemy.com/staticx/udemy/images/v7/logo-udemy.svg" type="image/svg+xml">
</head>
<body>

<div class="scroll-progress" id="scroll-progress"></div>

<header class="letter-header" id="letter-header">
  <div class="header-inner">
    <div class="header-brand">
      <img src="https://www.udemy.com/staticx/udemy/images/v7/logo-udemy.svg" alt="Udemy" class="udemy-logo" />
      <span class="header-divider">|</span>
      <span class="header-title">Letter</span>
    </div>
    <div class="header-actions">
      <div class="lang-toggle" id="lang-toggle">
        <button class="lang-btn active" data-lang="ko">🇰🇷 KO</button>
        <button class="lang-btn" data-lang="en">🇺🇸 EN</button>
      </div>
      <button class="btn-letter" id="btn-copy-link">🔗 링크 복사</button>
      <a href="#" class="btn-letter btn-primary" id="btn-campus">🚀 학습장</a>
    </div>
  </div>
</header>

<nav class="side-nav" id="side-nav"></nav>

<main id="letter-content">
  <div id="letter-loading" style="text-align:center;padding:6rem 2rem;color:#9090aa;">
    <div style="font-size:2rem;margin-bottom:1rem;">📮</div>
    <div>레터를 불러오는 중...</div>
  </div>
</main>

<footer class="letter-footer" id="letter-footer" style="display:none;">
  <div class="footer-inner">

    <div class="footer-links">
      <a href="#" class="footer-link" id="btn-archive">📖 이전 호 보기</a>
      <a href="#" class="footer-link" id="btn-unsubscribe">수신거부</a>
    </div>
    <p class="footer-copyright">Udemy Letter | 웅진씽크빅 &copy; 2026</p>
  </div>
</footer>

<!-- Mobile Bottom Bar (replaces floating top button) -->
<div class="mobile-bottom-bar" id="mobile-bottom-bar">
  <button class="mobile-bar-item" id="mobile-top-btn" aria-label="Top">↑</button>
</div>

<!-- Desktop only top button -->
<button class="scroll-to-top desktop-only" id="scroll-to-top" aria-label="Top">↑</button>

<script src="js/letter-viewer.js"></script>
</body>
</html>
